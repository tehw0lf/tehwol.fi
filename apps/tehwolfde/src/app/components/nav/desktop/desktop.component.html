<mat-toolbar
  [ngClass]="themeService.theme()"
  role="navigation"
  aria-label="Main navigation"
>
  <mat-toolbar-row class="nav-row">
    <button
      id="menu"
      type="button"
      (click)="toggleSidenav()"
      [style]="burgerStyle()"
      mat-icon-button
      aria-label="Open navigation menu"
    >
      <mat-icon>menu</mat-icon>
    </button>
    <div [style]="buttonStyle()" class="flex-row flex-fxflex">
      <div class="nav-item flex-gap-20">
        <a
          mat-button
          [ngClass]="{ 'link-active': isActive() }"
          routerLink="/home"
          routerLinkActive="link-active"
        >
          <span class="mat-button-wrapper">
            <img alt="tehwolf.de" class="nav-logo" src="../../favicon.svg" />
            <span>Home</span>
          </span>
        </a>
      </div>
      <div class="nav-item flex-gap-20">
        <a mat-button routerLink="/portfolio" routerLinkActive="link-active">
          <span class="mat-button-wrapper"> <span>Portfolio</span> </span>
        </a>
      </div>
      <div class="nav-item flex-gap-20">
        <a
          mat-button
          routerLink="/wordlist-generator"
          routerLinkActive="link-active"
        >
          <span class="mat-button-wrapper">
            <span>Wordlist Generator</span>
          </span>
        </a>
      </div>
      <div class="nav-item flex-gap-20">
        <a mat-button routerLink="/contact-form" routerLinkActive="link-active">
          <span class="mat-button-wrapper">
            <span>Contact Form</span>
          </span>
        </a>
      </div>
      <div class="nav-item flex-gap-20">
        <button mat-button [matMenuTriggerFor]="appsMenu">
          <span class="mat-button-wrapper">
            <span>Apps</span>
            <mat-icon>arrow_drop_down</mat-icon>
          </span>
        </button>
        <mat-menu #appsMenu="matMenu">
          <a mat-menu-item routerLink="/flowdive" routerLinkActive="link-active">Flowdive</a>
          <a mat-menu-item routerLink="/numveil" routerLinkActive="link-active">Numveil</a>
          <a mat-menu-item routerLink="/beep" routerLinkActive="link-active">Beep</a>
          <a mat-menu-item routerLink="/btrain" routerLinkActive="link-active">BTrain</a>
          <a mat-menu-item routerLink="/mutuals" routerLinkActive="link-active">Mutuals</a>
          <a mat-menu-item routerLink="/color" routerLinkActive="link-active">Color</a>
        </mat-menu>
      </div>
    </div>
    @if (themeService.theme() === 'dark') {
      <button
        id="light"
        class="light-theme-button flex-gap-20"
        type="button"
        (click)="switchToLight()"
        [style]="buttonStyle()"
        mat-icon-button
        aria-label="Switch to light theme"
      >
        <mat-icon>light_mode</mat-icon>
      </button>
    } @else {
      <button
        id="dark"
        class="dark-theme-button flex-gap-20"
        type="button"
        (click)="switchToDark()"
        [style]="buttonStyle()"
        mat-icon-button
        aria-label="Switch to dark theme"
      >
        <mat-icon>dark_mode</mat-icon>
      </button>
    }
    <div [style]="buttonStyle()">
      <div class="nav-item">
        <a mat-button target="_blank" href="https://github.com/tehw0lf">
          <span class="mat-button-wrapper">
            <img
              alt="tehwolf.de"
              class="nav-logo github"
              src="assets/icons/github.png"
            />
            <span class="github">GitHub</span>
          </span>
        </a>
      </div>
    </div>
  </mat-toolbar-row>
</mat-toolbar>
