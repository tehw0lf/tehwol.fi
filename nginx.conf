events {
  worker_connections  1024;
}

http {

    include /etc/nginx/mime.types;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
      text/plain
      text/css
      text/javascript
      application/javascript
      application/x-javascript
      application/xml
      application/json
      application/ld+json;

     server {

        listen 80;

        include /etc/nginx/security-headers.conf;

        location / {
            root /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html?$query_string;
        }

        location ~* \.(js|css)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.conf;
            access_log off;
        }

        location ~* \.(?:woff2?|ico|png|jpg|jpeg|gif|webp)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/security-headers.conf;
            access_log off;
        }

        # SVGs intentionally omit 'immutable': favicon.svg has no content hash
        location ~* \.svg$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public";
            include /etc/nginx/security-headers.conf;
            access_log off;
        }
    }
}
